  <!-- CORREÇÃO: <style> movido para o <head> (estava dentro de uma <div>) -->
  <style>
    :root {
      --fondo-oscuro: #1a1d2e;
      --texto-opaco: rgba(255, 255, 255, 0.7);
      --texto-claro: rgba(255, 255, 255, 0.95);
      --acento-primario: #00d4ff;
      --acento-secundario: #00a708;
      --espacio-xs: 10px;
      --espacio-sm: 18px;
      --espacio-md: 26px;
      --espacio-lg: 36px;
      --espacio-xl: 70px;
      --contenedor-ancho: 1280px;
      --radio-tarjeta: 18px;
    }

    .hero-section {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: var(--espacio-xl) var(--espacio-md);
      position: relative;
    }

    .card-grid {
      width: 100%;
      max-width: var(--contenedor-ancho);
      display: grid;
      grid-template-columns: repeat(1, 1fr);
      gap: var(--espacio-md);
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      list-style: none;
      border-radius: var(--radio-tarjeta);
      overflow: hidden;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 2px 8px rgba(0, 0, 0, 0.3);
      transition:
        transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
        box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: block;
    }

    .card::before {
      content: '';
      display: block;
      width: 100%;
      padding-bottom: 145%;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 8px 16px rgba(0, 0, 0, 0.4);
    }

    .card__background {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      filter: brightness(0.85) saturate(1.3) contrast(0.9);
      transform: scale(1) translateZ(0);
      transform-origin: center;
      transition:
        filter 0.4s cubic-bezier(0.4, 0, 0.2, 1),
        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card__background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(0, 0, 0, 0.3) 50%,
        rgba(0, 0, 0, 0.8) 100%);
      opacity: 0.8;
      transition: opacity 0.4s ease;
    }

    .card:hover .card__background {
      transform: scale(1.12) translateZ(0);
      filter: brightness(1) saturate(1.4) contrast(1);
    }

    .card:hover .card__background::after {
      opacity: 0.6;
    }

    .card-grid:hover > .card:not(:hover) .card__background {
      filter: brightness(0.4) saturate(0.2) contrast(1.3) blur(8px);
    }

    .card-grid:hover > .card:not(:hover) .card__background::after {
      opacity: 0.9;
    }

    .card__content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--espacio-md);
      z-index: 2;
      transform: translateY(0);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover .card__content {
      transform: translateY(-10px);
    }

    .card__category {
      color: var(--texto-opaco);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: var(--espacio-xs);
      display: inline-block;
      position: relative;
      padding-bottom: 5px;
    }

    .card__category::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 30px;
      height: 2px;
      background: linear-gradient(90deg, var(--acento-primario), var(--acento-secundario));
      transition: width 0.3s ease;
    }

    .card:hover .card__category::after {
      width: 100%;
    }

    .card__heading {
      color: var(--texto-claro);
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.3;
      text-shadow:
        2px 2px 8px rgba(0, 0, 0, 0.8),
        0 0 20px rgba(0, 0, 0, 0.5);
      word-spacing: 100vw;
      letter-spacing: -0.5px;
    }

    .card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border: 2px solid rgba(255, 255, 255, 0);
      border-radius: var(--radio-tarjeta);
      transition: border-color 0.3s ease;
      pointer-events: none;
    }

    .card:hover::after {
      border-color: rgba(255, 255, 255, 0.3);
    }

    @media (min-width: 600px) {
      .card-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--espacio-lg);
      }
    }

    @media (min-width: 1024px) {
      .card-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .card__heading { font-size: 1.9rem; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeInUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) backwards; }
    .card:nth-child(1) { animation-delay: 0.1s; }
    .card:nth-child(2) { animation-delay: 0.2s; }
    .card:nth-child(3) { animation-delay: 0.3s; }
    .card:nth-child(4) { animation-delay: 0.4s; }
    .card:nth-child(5) { animation-delay: 0.5s; }
    .card:nth-child(6) { animation-delay: 0.6s; }
  </style>
</head>
