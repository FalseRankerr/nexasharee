<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexaShare — Login</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; }
    input, button, .caixa-login { font-family: inherit; }
  </style>
</head>
<body>

  <!-- Modo Escuro -->
  <div class="toggle-theme-login">
    <span>Modo Escuro</span>
    <label class="switch">
      <input type="checkbox" id="theme-toggle">
    </label>
  </div>

  <!-- Logo -->
  <div class="logotipo">
    <a href="./pagina_inicial.html">
      <img src="./nexalogo.png" alt="Logo">
    </a>
  </div>

  <!-- Formulário de login -->
  <div class="caixa-login">
    <img src="./nexalogo.png" alt="Logo" class="logotipo-pequeno">
    <h2>Login</h2>
    <input type="email" placeholder="Digite seu e-mail" id="email" required>
    <div class="erro" id="erro-email"></div>
    <input type="password" placeholder="Digite sua senha" id="senha">
    <div class="erro" id="erro-senha"></div>
    <a href="./recuperar-senha.html">Esqueceu a senha?</a>
    <button class="botao-entrar" id="btn-entrar">Entrar</button>
    <a href="./cadastro.html" class="botao-registrar">Registre-se</a>
  </div>
  <script src="./script.js"></script>
</body>
</html>
